<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOPE ENERGY EMW PLC</title>

    <link rel="icon" type="image/png" href="/assets/favicon1.png" />

    <style>
      /* === FULL SCREEN LOADER === */
      #loader {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at top, #0f2a44, #050b14);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
        overflow: hidden;
      }

      /* === AI GRID BACKGROUND === */
      #loader::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: linear-gradient(rgba(0, 255, 150, 0.05) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0, 255, 150, 0.05) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: gridMove 20s linear infinite;
      }

      @keyframes gridMove {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-60px, -60px);
        }
      }

      /* === SOLAR PANEL === */
      .solar-panel {
        width: 90px;
        height: 60px;
        background: linear-gradient(135deg, #0ea5e9, #1e3a8a);
        border-radius: 6px;
        box-shadow: 0 0 20px rgba(0, 200, 255, 0.4);
        position: relative;
        overflow: hidden;
      }

      /* Panel grid lines */
      .solar-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to right,
          rgba(255, 255, 255, 0.1) 0px,
          rgba(255, 255, 255, 0.1) 2px,
          transparent 2px,
          transparent 15px
        );
      }

      /* ENERGY FLOW EFFECT */
      .energy-flow {
        position: absolute;
        width: 200%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 180, 0.6),
          transparent
        );
        animation: flow 2s linear infinite;
      }

      @keyframes flow {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(100%);
        }
      }

      /* === SUN === */
      .sun {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffd700, #ff8c00);
        box-shadow: 0 0 40px rgba(255, 200, 0, 0.7);
        margin-bottom: 20px;
        animation: pulse 2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      /* === ELECTRIC LINE === */
      .line {
        width: 2px;
        height: 40px;
        background: linear-gradient(to bottom, #00ffcc, transparent);
        margin: 10px 0;
        animation: energyDrop 1.2s infinite;
      }

      @keyframes energyDrop {
        0% {
          opacity: 0;
          transform: translateY(-10px);
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(20px);
        }
      }

      /* === BRAND TEXT === */
      .brand {
        margin-top: 25px;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 1px;
        color: white;
        text-align: center;
      }

      .brand span {
        color: #00ffae;
        text-shadow: 0 0 10px rgba(0, 255, 170, 0.7);
      }

      /* === LOADING TEXT === */
      .loading-text {
        margin-top: 10px;
        font-size: 12px;
        color: #9ca3af;
        letter-spacing: 2px;
        animation: blink 1.5s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- === LOADER === -->
    <div id="loader">
      <div class="sun"></div>

      <div class="solar-panel">
        <div class="energy-flow"></div>
      </div>

      <div class="line"></div>

      <div class="brand">
        HOPE <span>ENERGY</span> EMW PLC
      </div>

      <div class="loading-text">INITIALIZING SMART ENERGY...</div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        setTimeout(() => loader.remove(), 600);
      });
    </script>
  </body>
</html>
