<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hope Energy</title>

    <!-- ✅ Add your favicon logo here -->
    <link rel="icon" type="image/png" href="/assets/favicon1.png" />
    <!-- You can use .ico or .svg too: href="/assets/favicon.ico" -->

    <style>
      /* --- Loading screen styling --- */
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0b1726; /* your site background color */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }

      .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid rgba(255, 255, 255, 0.2);
        border-top-color: #00d084; /* green accent color */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-SLD9-cIw.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B6IFLUys.css">
  </head>
  <body>
    <!-- Loading spinner -->
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <!-- React root -->
    <div id="root"></div>


    <script>
      // When React fully loads, remove loader
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        setTimeout(() => loader.remove(), 400);
      });
    </script>
  </body>
</html>
